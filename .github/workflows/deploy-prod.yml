name: Deploy → taxalex.de

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.confirm == 'deploy'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/taxalex

            echo "==> Pulling latest code"
            GIT_SSH_COMMAND='ssh -i /home/deploy/.ssh/id_ed25519_taxalex -F /home/deploy/.ssh/config' git pull origin main

            echo "==> Building production image"
            docker build -t taxalex-frontend:latest .

            echo "==> Deploying production stack"
            docker stack deploy -c docker-compose.yml taxalex
            docker service update --force --image taxalex-frontend:latest taxalex_frontend

            echo "==> Waiting for service to converge"
            sleep 20
            curl -sf http://localhost:3010/ > /dev/null && echo "==> taxalex.de is up" || echo "==> WARNING: health check failed"
