name: Deploy → dev.taxalex.de

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/taxalex-dev

            echo "==> Pulling latest code"
            GIT_SSH_COMMAND='ssh -i /home/deploy/.ssh/id_ed25519_taxalex -F /home/deploy/.ssh/config' git pull origin main

            echo "==> Building dev image"
            docker build -t taxalex-frontend:dev .

            echo "==> Deploying dev stack"
            docker stack deploy -c docker-compose-dev.yml taxalex-dev
            docker service update --force --image taxalex-frontend:dev taxalex-dev_frontend

            echo "==> Waiting for service to converge"
            sleep 20
            curl -sf http://localhost:3011/ > /dev/null && echo "==> dev.taxalex.de is up" || echo "==> WARNING: health check failed"
