# taxalex.de — production
server {
    listen 80;
    server_name taxalex.de www.taxalex.de;
    return 301 https://taxalex.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.taxalex.de;

    ssl_certificate     /etc/letsencrypt/live/taxalex.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxalex.de/privkey.pem;

    return 301 https://taxalex.de$request_uri;
}

server {
    listen 443 ssl http2;
    server_name taxalex.de;

    ssl_certificate     /etc/letsencrypt/live/taxalex.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxalex.de/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

