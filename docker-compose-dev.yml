services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: https://dev.taxalex.de
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAAC0Q18q_3UVCtZxY
    image: taxalex-frontend:dev
    container_name: taxalex-frontend-dev
    ports:
      - target: 3000
        published: 3011
        protocol: tcp
        mode: host
    secrets:
      - anthropic_api_key_dev
      - openai_api_key_dev
      - google_ai_api_key_dev
      - perplexity_api_key_dev
      - nextauth_secret_dev
      - database_url_dev
      - taxalex_brevo_api_key_dev
      - taxalex_email_from_dev
      - taxalex_email_from_name_dev
      - taxalex_app_url_dev
      - stripe_secret_key_dev
      - stripe_publishable_key_dev
      - source: taxalex_stripe_webhook_secret_dev
        target: stripe_webhook_secret_dev
      - turnstile_secret_key_dev
      - cron_secret_dev
    environment:
      - NODE_ENV=production
      - DEBUG_LOGS=true
      - NEXT_PUBLIC_SITE_URL=https://dev.taxalex.de
      - NEXTAUTH_URL=https://dev.taxalex.de
      - FEATURE_PAYMENTS=true
      - FEATURE_ADVISOR=true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /app/.next/cache:noexec,nosuid,size=100m
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 100M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

secrets:
  anthropic_api_key_dev:
    external: true
  openai_api_key_dev:
    external: true
  google_ai_api_key_dev:
    external: true
  perplexity_api_key_dev:
    external: true
  nextauth_secret_dev:
    external: true
  database_url_dev:
    external: true
  taxalex_brevo_api_key_dev:
    external: true
  taxalex_email_from_dev:
    external: true
  taxalex_email_from_name_dev:
    external: true
  taxalex_app_url_dev:
    external: true
  stripe_secret_key_dev:
    external: true
  stripe_publishable_key_dev:
    external: true
  taxalex_stripe_webhook_secret_dev:
    external: true
  turnstile_secret_key_dev:
    external: true
  cron_secret_dev:
    external: true
