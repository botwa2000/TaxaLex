services:
  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: https://dev.taxalex.de
        NEXT_PUBLIC_DEBUG_LOGS: "true"
    image: taxalex-frontend-dev:latest
    container_name: taxalex-frontend-dev
    ports:
      - "3011:3000"
    secrets:
      - anthropic_api_key_dev
      - openai_api_key_dev
      - nextauth_secret_dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=https://dev.taxalex.de
      - NEXTAUTH_URL=https://dev.taxalex.de
      - AUTH_URL=https://dev.taxalex.de
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
      - /app/.next/cache:noexec,nosuid,size=100m
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 100M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

secrets:
  anthropic_api_key_dev:
    external: true
  openai_api_key_dev:
    external: true
  nextauth_secret_dev:
    external: true
